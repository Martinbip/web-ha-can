# Nginx config cho smadesign.vn
# File này được deploy.sh copy vào /etc/nginx/sites-available/smadesign.vn

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name smadesign.vn www.smadesign.vn;

    # Certbot sẽ tự thêm location /.well-known/acme-challenge/
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name smadesign.vn www.smadesign.vn;

    # SSL — Certbot tự điền sau khi chạy: certbot --nginx -d smadesign.vn -d www.smadesign.vn
    # ssl_certificate /etc/letsencrypt/live/smadesign.vn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/smadesign.vn/privkey.pem;

    root /var/www/smadesign.vn;
    index index.html;

    # Inject STRAPI_URL vào tất cả trang HTML
    sub_filter '</head>' '<script>window.__STRAPI_URL="https://smadesign.vn";</script></head>';
    sub_filter_once on;

    # Giới hạn upload size (cho Strapi media)
    client_max_body_size 50M;

    # ── Strapi API ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Strapi Admin Panel ──────────────────────────────
    location /admin {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Strapi Upload files ─────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache media files
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Frontend static files ───────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;

        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|woff2|woff|ttf|css|js)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Bảo mật cơ bản
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Ẩn các file nhạy cảm
    location ~ /\. { deny all; }
    location ~ ~$ { deny all; }
}
