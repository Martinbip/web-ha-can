# Nginx config cho smadesign.vn
# QUAN TRỌNG: File này là template. Trên server, Certbot đã thêm SSL.
# deploy.sh KHÔNG ghi đè trực tiếp — chỉ đồng bộ các location block.

server {
    server_name smadesign.vn www.smadesign.vn;

    root /var/www/smadesign.vn;
    index index.html;

    # Giới hạn upload size (cho Strapi media)
    client_max_body_size 50M;

    # ── Strapi API ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Strapi Admin Panel ──────────────────────────────
    location /admin {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Strapi Content Manager API ──────────────────────
    location /content-manager/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Strapi plugin APIs ──────────────────────────────
    location /content-type-builder/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /i18n/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /users-permissions/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Strapi Upload API (admin media library) ─────────
    location /upload/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Strapi Upload files (static) ────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:1337;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Cache media files
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Redirect .html URLs to clean URLs (SEO) ─────────
    location ~ ^(.+)\.html$ {
        return 301 $1;
    }

    # ── Frontend static files ───────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;

        # Cache static assets
        location ~* \.(jpg|jpeg|png|gif|svg|ico|webp|woff2|woff|ttf|css|js)$ {
            expires 7d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Bảo mật cơ bản
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Ẩn các file nhạy cảm
    location ~ /\. { deny all; }
    location ~ ~$ { deny all; }

    # SSL được quản lý bởi Certbot trên server — không commit vào repo
}
